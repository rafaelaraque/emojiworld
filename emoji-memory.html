<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🃏 Emoji Memory - EMOJI WORLD</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --g: #00C853;
      --g2: #008a3a;
      --dark: #111B21;
      --panel: #202C33;
      --p2: #2A3942;
      --tx: #E9EDEF;
      --tx2: #8696A0;
      --yl: #FFD93D;
      --or: #FF6B35;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      padding: 20px;
    }

    .game-container {
      background: rgba(0, 0, 30, 0.9);
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      border: 4px solid #ff6b6b;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .game-title {
      font-family: 'Fredoka One', cursive;
      font-size: 28px;
      color: var(--yl);
      margin-bottom: 10px;
    }

    .game-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
      color: white;
    }

    .stat-label {
      color: var(--tx2);
      font-size: 12px;
      display: block;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 24px;
    }

    .stat-value.timer {
      color: var(--yl);
    }

    .stat-value.moves {
      color: var(--g);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      aspect-ratio: 1;
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    .card-back {
      background: linear-gradient(145deg, #ff6b6b, #ff8e53);
    }

    .card-back::after {
      content: '?';
      font-family: 'Fredoka One', cursive;
      font-size: 32px;
      color: white;
    }

    .card-front {
      background: linear-gradient(145deg, #4facfe, #00f2fe);
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      background: linear-gradient(145deg, #00C853, #00e676);
    }

    .game-message {
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }

    .game-message.show {
      display: block;
    }

    .game-message.win {
      background: rgba(0, 200, 83, 0.2);
      border: 2px solid var(--g);
    }

    .game-message.lose {
      background: rgba(255, 68, 68, 0.2);
      border: 2px solid var(--or);
    }

    .game-message h3 {
      font-family: 'Fredoka One', cursive;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .game-message.win h3 {
      color: var(--g);
    }

    .game-message.lose h3 {
      color: var(--or);
    }

    .game-message p {
      color: var(--tx);
      font-size: 16px;
    }

    .game-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn {
      padding: 12px 30px;
      border-radius: 25px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--g);
      color: white;
    }

    .btn-primary:hover {
      background: var(--g2);
      transform: scale(1.05);
    }

    .btn-secondary {
      background: var(--panel);
      color: white;
      border: 2px solid var(--tx2);
    }

    .btn-secondary:hover {
      background: var(--p2);
      transform: scale(1.05);
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 16px;
      border-radius: 20px;
      transition: all 0.2s;
    }

    .back-link:hover {
      background: rgba(0, 0, 0, 0.7);
      transform: scale(1.05);
    }

    @media (max-width: 480px) {
      .game-container {
        padding: 20px;
      }

      .game-title {
        font-size: 24px;
      }

      .game-grid {
        gap: 8px;
      }

      .card-face {
        font-size: 28px;
      }

      .card-back::after {
        font-size: 24px;
      }

      .stat-value {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <a href="mini-games.html" class="back-link">← Volver</a>

  <div class="game-container">
    <div class="game-header">
      <h1 class="game-title">🃏 Emoji Memory</h1>
    </div>

    <div class="game-stats">
      <div class="stat">
        <span class="stat-label">Tiempo</span>
        <span class="stat-value timer" id="timer">60</span>
      </div>
      <div class="stat">
        <span class="stat-label">Movimientos</span>
        <span class="stat-value moves" id="moves">0</span>
      </div>
    </div>

    <div class="game-grid" id="gameGrid"></div>

    <div class="game-message" id="gameMessage">
      <h3 id="messageTitle"></h3>
      <p id="messageText"></p>
    </div>

    <div class="game-buttons">
      <button class="btn btn-primary" onclick="initGame()">🔄 Reiniciar</button>
    </div>
  </div>

  <script>
    const EMOJIS = ['🌵', '🛸', '🥶', '🤖', '👾', '🌪️', '🚌', '🚙'];
    
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let timeLeft = 60;
    let timerInterval = null;
    let gameActive = false;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function initGame() {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';
      
      flippedCards = [];
      matchedPairs = 0;
      moves = 0;
      timeLeft = 60;
      gameActive = true;
      
      document.getElementById('timer').textContent = timeLeft;
      document.getElementById('moves').textContent = moves;
      
      const messageEl = document.getElementById('gameMessage');
      messageEl.classList.remove('show', 'win', 'lose');
      
      if (timerInterval) clearInterval(timerInterval);
      
      const selectedEmojis = [...EMOJIS];
      const cardEmojis = [...selectedEmojis, ...selectedEmojis];
      shuffle(cardEmojis);
      
      cards = [];
      
      cardEmojis.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">${emoji}</div>
          </div>
        `;
        card.addEventListener('click', () => flipCard(index));
        grid.appendChild(card);
        cards.push({
          emoji: emoji,
          element: card,
          flipped: false,
          matched: false
        });
      });
      
      timerInterval = setInterval(updateTimer, 1000);
    }

    function flipCard(index) {
      if (!gameActive) return;
      
      const card = cards[index];
      
      if (card.flipped || card.matched || flippedCards.length >= 2) {
        return;
      }
      
      card.flipped = true;
      card.element.classList.add('flipped');
      flippedCards.push(index);
      
      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const card1 = cards[flippedCards[0]];
      const card2 = cards[flippedCards[1]];
      
      if (card1.emoji === card2.emoji) {
        card1.matched = true;
        card2.matched = true;
        card1.element.classList.add('matched');
        card2.element.classList.add('matched');
        matchedPairs++;
        flippedCards = [];
        
        if (matchedPairs === 8) {
          endGame(true);
        }
      } else {
        setTimeout(() => {
          card1.flipped = false;
          card2.flipped = false;
          card1.element.classList.remove('flipped');
          card2.element.classList.remove('flipped');
          flippedCards = [];
        }, 1000);
      }
    }

    function updateTimer() {
      timeLeft--;
      document.getElementById('timer').textContent = timeLeft;
      
      if (timeLeft <= 0) {
        endGame(false);
      }
    }

    function endGame(win) {
      gameActive = false;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      
      const messageEl = document.getElementById('gameMessage');
      const titleEl = document.getElementById('messageTitle');
      const textEl = document.getElementById('messageText');
      
      if (win) {
        messageEl.classList.add('show', 'win');
        titleEl.textContent = '🎉 ¡Felicidades!';
        textEl.textContent = `Completaste el juego en ${moves} movimientos y ${60 - timeLeft} segundos.`;
      } else {
        messageEl.classList.add('show', 'lose');
        titleEl.textContent = '⏰ ¡Tiempo Agotado!';
        textEl.textContent = `Llegaste a ${matchedPairs} de 8 pares. ¡Inténtalo de nuevo!`;
      }
    }

    // Iniciar juego al cargar la página
    document.addEventListener('DOMContentLoaded', initGame);
  </script>
</body>
</html>
